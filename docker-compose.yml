# FlipSync — staging local : Postgres + API en une commande.
#   docker compose up --build -d --wait
#   curl http://localhost:3001/health
#   docker compose down            (ajouter -v pour effacer la base)
#
# Les valeurs ${VAR:-défaut} permettent un démarrage sans config ; surcharger
# via un fichier .env dans ce dossier ou l'environnement du shell.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flipsync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flipsync}
      POSTGRES_DB: ${POSTGRES_DB:-flipsync}
    ports:
      # Host 5434 pour ne pas entrer en conflit avec le conteneur de dev (5433).
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - flipsync-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flipsync} -d ${POSTGRES_DB:-flipsync}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: flipsync-api:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Réseau interne compose : l'hôte de la base est le nom de service `postgres`.
      DATABASE_URL: postgresql://${POSTGRES_USER:-flipsync}:${POSTGRES_PASSWORD:-flipsync}@postgres:5432/${POSTGRES_DB:-flipsync}
      DIRECT_URL: postgresql://${POSTGRES_USER:-flipsync}:${POSTGRES_PASSWORD:-flipsync}@postgres:5432/${POSTGRES_DB:-flipsync}
      JWT_SECRET: ${JWT_SECRET:-staging-only-secret-min-32-characters-change-me}
      # Staging : development → /auth/dev-token + devLink disponibles pour tester.
      NODE_ENV: ${NODE_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: "3001"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3001}
      MAGIC_LINK_REDIRECT_URL: ${MAGIC_LINK_REDIRECT_URL:-flipsync://auth/verify}
      # Stripe : placeholders pour permettre le boot (la route /stripe exige des
      # clés présentes). Webhooks réels → renseigner de vraies clés test.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      # Optionnels — vides : email (fallback console) / marketplace dégradent proprement.
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-FlipSync <login@flipsync.fr>}
      VINTED_ACCESS_TOKEN: ${VINTED_ACCESS_TOKEN:-}
      LEBONCOIN_ACCESS_TOKEN: ${LEBONCOIN_ACCESS_TOKEN:-}
    ports:
      - "${API_HOST_PORT:-3001}:3001"
    volumes:
      # Persiste les photos uploadées entre redémarrages.
      - flipsync-uploads:/app/apps/api/uploads
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  flipsync-pgdata:
  flipsync-uploads:
