name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule un run précédent encore en cours sur la même branche/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Typecheck · Test
    runs-on: ubuntu-latest

    # Postgres réel pour les tests e2e (.db.test.ts).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flipsync
          POSTGRES_PASSWORD: flipsync
          POSTGRES_DB: flipsync
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flipsync -d flipsync"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://flipsync:flipsync@localhost:5432/flipsync
      DIRECT_URL: postgresql://flipsync:flipsync@localhost:5432/flipsync

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema packages/db/prisma/schema.prisma

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/db/prisma/schema.prisma

      # turbo résout l'ordre (build → test ; typecheck inclut le mobile via tsc --noEmit).
      - name: Build, test, typecheck
        run: npx turbo run build test typecheck
