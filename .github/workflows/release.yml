name: Release

# Déclenché par un tag de version, ex. `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ['v*']

jobs:
  # ─── Image API → GitHub Container Registry ────────────────────────────────────
  docker:
    name: Build & push API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # ghcr.io/<owner>/<repo>-api — doit être en minuscules.
          images: ghcr.io/${{ github.repository }}-api
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Build mobile → EAS (cloud) ───────────────────────────────────────────────
  mobile:
    name: EAS production build
    runs-on: ubuntu-latest
    # Opt-in : définir la variable de repo ENABLE_EAS=true + le secret EXPO_TOKEN.
    # Tant que non activé, le job est sauté (pas d'échec rouge avant config Expo).
    if: ${{ vars.ENABLE_EAS == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      # --no-wait : déclenche le build cloud sans bloquer le job.
      - name: Trigger EAS build
        working-directory: apps/mobile
        run: eas build --platform all --profile production --non-interactive --no-wait
